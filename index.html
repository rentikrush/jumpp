<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Jump Game</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    touch-action:none;
}

canvas{
    display:block;
    margin:auto;
}
</style>
</head>
<body>

<canvas id="game" width="400" height="700"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// assets
const bg = new Image();
bg.src = "assets/bg.jpg";

const playerImg = new Image();
playerImg.src = "assets/player.png";

const platformImg = new Image();
platformImg.src = "assets/platform.png";

// player
const player = {
    x:180,
    y:600,
    w:60,
    h:60,
    vy:0
};

const gravity = 0.45;
const jumpPower = -16;
const bonusJump = -22;

// game state
let currentStep = 1;
let gameWon = false;
let gameOver = false;

// camera + juice
let cameraY = 0;
let cameraShake = 0;
let slowMo = 1;

// input
const keys = {};
let touchLeft = false;
let touchRight = false;

// trail
let trail = [];

// particles
let particles = [];

// controls
document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

canvas.addEventListener("touchstart", (e) => {
    const x = e.touches[0].clientX;
    if (x < window.innerWidth / 2) touchLeft = true;
    else touchRight = true;

    navigator.vibrate?.(10);
});

canvas.addEventListener("touchend", () => {
    touchLeft = false;
    touchRight = false;
});

// restart click
canvas.addEventListener("click", (e)=>{

    if(!gameOver) return;

    const r = canvas.getBoundingClientRect();
    const x = e.clientX - r.left;
    const y = e.clientY - r.top;

    if(x>120 && x<280 && y>380 && y<430){
        restart();
    }
});

// platforms
let platforms = [];
let lastX = 160;

function create(){

    platforms = [];
    lastX = 160;

    for(let i=0;i<100;i++){

        let move = Math.random()*140 - 70;
        lastX += move;

        if(lastX < 20) lastX = 20;
        if(lastX > 300) lastX = 300;

        platforms.push({
            x:lastX,
            y:650 - i*140,
            w:80,
            h:20,
            type: Math.random()<0.15?"break":(Math.random()<0.1?"bonus":"normal"),
            number:i+1,
            touched:false
        });
    }

    platforms[0].type="normal";
}

create();

// particles
function boom(x,y,color="white"){
    for(let i=0;i<10;i++){
        particles.push({
            x:x,
            y:y,
            vx:(Math.random()-0.5)*6,
            vy:(Math.random()-0.5)*6,
            life:25,
            color
        });
    }
}

// restart
function restart(){

    player.x=180;
    player.y=600;
    player.vy=0;

    currentStep=1;
    gameWon=false;
    gameOver=false;

    cameraY=0;
    cameraShake=0;

    trail=[];
    particles=[];
    create();
}

// update
function update(){

    if(gameOver || gameWon) return;

    let speed = 6 * slowMo;

    if(keys["ArrowLeft"]||touchLeft) player.x -= speed;
    if(keys["ArrowRight"]||touchRight) player.x += speed;

    if(player.x>canvas.width) player.x=-player.w;
    if(player.x+player.w<0) player.x=canvas.width;

    // trail
    trail.push({x:player.x,y:player.y});
    if(trail.length>10) trail.shift();

    player.vy += gravity * slowMo;
    player.y += player.vy * slowMo;

    for(const p of platforms){

        let hit =
            player.vy>0 &&
            player.x<p.x+p.w &&
            player.x+player.w>p.x &&
            player.y+player.h>p.y &&
            player.y+player.h<p.y+p.h;

        if(hit){

            navigator.vibrate?.(15);
            boom(p.x,p.y,"#fff");

            if(p.type==="bonus") player.vy=bonusJump;
            else player.vy=jumpPower;

            if(p.type==="break") {
                p.y=9999;
                cameraShake=10;
            }

            if(!p.touched){
                p.touched=true;
                currentStep=p.number;

                if(currentStep>=100){
                    gameWon=true;
                    slowMo=0.3;
                    navigator.vibrate?.(100);
                }
            }
        }

        if(p.number===100){
            p.isCrown=true;
        }
    }

    if(player.y-cameraY<250){
        cameraY+=(player.y-cameraY-250)*0.1;
    }

    updateParticles();

    if(player.y-cameraY>canvas.height+200){
        gameOver=true;
        cameraShake=20;
    }
}

// particles update
function updateParticles(){

    particles.forEach(p=>{
        p.x+=p.vx;
        p.y+=p.vy;
        p.life--;
    });

    particles=particles.filter(p=>p.life>0);
}

// draw
function draw(){

    let shakeX = (Math.random()-0.5)*cameraShake;
    let shakeY = (Math.random()-0.5)*cameraShake;

    cameraShake *= 0.9;

    // parallax bg
    if(bg.complete){
        ctx.drawImage(bg,0+shakeX,0+cameraY*0.2+shakeY,400,700);
    }

    // trail
    for(let i=0;i<trail.length;i++){
        ctx.fillStyle="rgba(255,255,255,"+i/trail.length+")";
        ctx.fillRect(trail[i].x,trail[i].y-cameraY,5,5);
    }

    // platforms
    for(const p of platforms){

        let y=p.y-cameraY;
        if(y<-100||y>800) continue;

        if(p.isCrown){
            ctx.fillStyle="gold";
        } else if(p.type==="break"){
            ctx.fillStyle="red";
        } else if(p.type==="bonus"){
            ctx.fillStyle="cyan";
        } else {
            ctx.fillStyle="lime";
        }

        ctx.fillRect(p.x+shakeX,y+shakeY,p.w,p.h);

        if(p.isCrown){
            ctx.fillStyle="yellow";
            ctx.font="20px Fredoka";
            ctx.fillText("👑",p.x+20,y);
        }
    }

    // particles
    for(const p of particles){
        ctx.fillStyle=p.color;
        ctx.fillRect(p.x,p.y-cameraY,3,3);
    }

    // player
    let py=player.y-cameraY;

    ctx.save();
    ctx.translate(shakeX,shakeY);

    if(playerImg.complete){
        ctx.drawImage(playerImg,player.x,py,player.w,player.h);
    } else {
        ctx.fillStyle="white";
        ctx.fillRect(player.x,py,player.w,player.h);
    }

    ctx.restore();

    // UI
    ctx.fillStyle="white";
    ctx.font="24px Fredoka";
    ctx.fillText(`Escalón: ${currentStep}/100`,10,35);

    // win
    if(gameWon){
        ctx.fillStyle="rgba(0,0,0,0.8)";
        ctx.fillRect(0,0,400,700);

        ctx.textAlign="center";
        ctx.fillStyle="#ff77aa";
        ctx.font="40px Fredoka";

        ctx.fillText("Sos la mejor princesa",200,300);
        ctx.fillText("❤️",200,360);

        ctx.fillStyle="white";
        ctx.font="24px Fredoka";
        ctx.fillText("¡Felicitaciones!",200,430);
    }

    // game over
    if(gameOver){
        ctx.fillStyle="rgba(0,0,0,0.85)";
        ctx.fillRect(0,0,400,700);

        ctx.textAlign="center";

        ctx.fillStyle="white";
        ctx.font="28px Fredoka";

        ctx.fillText("No pasa nada 😌",200,280);
        ctx.fillText("Intentá otra vez",200,330);

        ctx.fillStyle="#ff77aa";
        ctx.fillRect(120,380,160,50);

        ctx.fillStyle="#000";
        ctx.font="20px Fredoka";
        ctx.fillText("Jugar otra vez",200,412);
    }
}

// loop
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
