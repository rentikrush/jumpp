<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Jump Game</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
    margin:auto;
}
</style>
</head>
<body>

<canvas id="game" width="400" height="700"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// картинки
const bg = new Image();
bg.src = "assets/bg.jpg";

const playerImg = new Image();
playerImg.src = "assets/player.png";

const platformImg = new Image();
platformImg.src = "assets/platform.png";

// игрок
const player = {
    x:180,
    y:600,
    w:60,
    h:60,
    vy:0
};

const gravity = 0.45;
const jumpPower = -16;

let currentStep = 1;
let gameWon = false;

const keys = {};

document.addEventListener("keydown", e=>{
    keys[e.code] = true;
});

document.addEventListener("keyup", e=>{
    keys[e.code] = false;
});

// платформы
const platforms = [];

let lastX = 160;

for(let i=0;i<100;i++){

    let move = Math.random()*80 - 40;
    lastX += move;

    if(lastX < 20) lastX = 20;
    if(lastX > 300) lastX = 300;

    platforms.push({
        x:lastX,
        y:650 - i*110,
        w:80,
        h:20,
        touched:false,
        number:i+1
    });
}

platforms[0].touched = true;

let cameraY = 0;

function update(){

    if(gameWon) return;

    // движение
    if(keys["ArrowLeft"]){
        player.x -= 6;
    }

    if(keys["ArrowRight"]){
        player.x += 6;
    }

    // телепорт
    if(player.x > canvas.width){
        player.x = -player.w;
    }

    if(player.x + player.w < 0){
        player.x = canvas.width;
    }

    // физика
    player.vy += gravity;
    player.y += player.vy;

    // столкновения
    for(const p of platforms){

        if(
            player.vy > 0 &&
            player.x < p.x + p.w &&
            player.x + player.w > p.x &&
            player.y + player.h > p.y &&
            player.y + player.h < p.y + p.h
        ){

            player.vy = jumpPower;

            if(!p.touched){

                p.touched = true;

                if(p.number > currentStep){
                    currentStep = p.number;
                }

                if(currentStep >= 100){
                    gameWon = true;
                }
            }
        }
    }

    // камера
    if(player.y - cameraY < 250){
        cameraY = player.y - 250;
    }
}

function draw(){

    // фон
    if(bg.complete && bg.naturalWidth > 0){
        ctx.drawImage(bg,0,0,canvas.width,canvas.height);
    }else{
        ctx.fillStyle = "#111";
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    // платформы
    for(const p of platforms){

        const sy = p.y - cameraY;

        if(sy < -50 || sy > canvas.height + 50){
            continue;
        }

        if(platformImg.complete && platformImg.naturalWidth > 0){

            ctx.drawImage(
                platformImg,
                p.x,
                sy,
                p.w,
                p.h
            );

        }else{

            ctx.fillStyle = "lime";
            ctx.fillRect(
                p.x,
                sy,
                p.w,
                p.h
            );
        }
    }

    // игрок
    const playerScreenY = player.y - cameraY;

    if(playerImg.complete && playerImg.naturalWidth > 0){

        ctx.drawImage(
            playerImg,
            player.x,
            playerScreenY,
            player.w,
            player.h
        );

    }else{

        ctx.fillStyle = "white";
        ctx.fillRect(
            player.x,
            playerScreenY,
            player.w,
            player.h
        );
    }

    // счётчик
    ctx.fillStyle = "white";
    ctx.font = "24px Fredoka";
    ctx.fillText(
        "Escalón: " + currentStep + "/100",
        10,
        35
    );

    // победа
    if(gameWon){

        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.fillRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        ctx.textAlign = "center";

        ctx.strokeStyle = "#000";
        ctx.lineWidth = 6;

        ctx.fillStyle = "#ff77aa";
        ctx.font = "42px Fredoka";

        ctx.strokeText(
            "Sos la mejor",
            canvas.width/2,
            280
        );

        ctx.fillText(
            "Sos la mejor",
            canvas.width/2,
            280
        );

        ctx.strokeText(
            "princesa ❤️",
            canvas.width/2,
            340
        );

        ctx.fillText(
            "princesa ❤️",
            canvas.width/2,
            340
        );

        ctx.fillStyle = "#ffffff";
        ctx.font = "26px Fredoka";

        ctx.strokeText(
            "¡Felicitaciones!",
            canvas.width/2,
            420
        );

        ctx.fillText(
            "¡Felicitaciones!",
            canvas.width/2,
            420
        );
    }
}

function loop(){

    update();
    draw();

    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
