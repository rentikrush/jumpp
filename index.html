<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Jump Game</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    touch-action:none;
}

canvas{
    display:block;
    margin:auto;
}
</style>
</head>
<body>

<canvas id="game" width="400" height="700"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// assets
const bg = new Image();
bg.src = "assets/bg.jpg";

const playerImg = new Image();
playerImg.src = "assets/player.png";

const platformImg = new Image();
platformImg.src = "assets/platform.png";

// player
const player = {
    x:180,
    y:600,
    w:60,
    h:60,
    vy:0
};

const gravity = 0.45;
const jumpPower = -16;
const bonusJump = -22;

let currentStep = 1;

let gameWon = false;
let gameOver = false;

// controls
const keys = {};
let touchLeft = false;
let touchRight = false;

// particles
let particles = [];

// restart helper
let lastX = 160;

// input
document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

// touch controls
canvas.addEventListener("touchstart", (e) => {
    const x = e.touches[0].clientX;
    if (x < window.innerWidth / 2) touchLeft = true;
    else touchRight = true;
});

canvas.addEventListener("touchend", () => {
    touchLeft = false;
    touchRight = false;
});

// click restart button
canvas.addEventListener("click", (e)=>{

    if(!gameOver) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if(x > 120 && x < 280 && y > 380 && y < 430){
        restartGame();
    }
});

// platforms
let platforms = [];

function createPlatforms(){

    platforms = [];
    lastX = 160;

    for(let i=0;i<100;i++){

        let move = Math.random()*140 - 70;
        lastX += move;

        if(lastX < 20) lastX = 20;
        if(lastX > 300) lastX = 300;

        let type = "normal";
        if(Math.random() < 0.15) type = "break";
        if(Math.random() < 0.08) type = "bonus";

        platforms.push({
            x:lastX,
            y:650 - i*140,
            w:80,
            h:20,
            number:i+1,
            touched:false,
            type:type
        });
    }

    platforms[0].type = "normal";
}

createPlatforms();

let cameraY = 0;

// particles
function spawnParticles(x,y){
    for(let i=0;i<6;i++){
        particles.push({
            x:x+40,
            y:y,
            vx:(Math.random()-0.5)*4,
            vy:(Math.random()-0.5)*4,
            life:20
        });
    }
}

function updateParticles(){
    particles.forEach(p=>{
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
    });
    particles = particles.filter(p=>p.life>0);
}

// restart
function restartGame(){

    player.x = 180;
    player.y = 600;
    player.vy = 0;

    currentStep = 1;
    cameraY = 0;

    gameWon = false;
    gameOver = false;

    particles = [];

    createPlatforms();
}

// update
function update(){

    if(gameOver  gameWon) return;

    if(keys["ArrowLeft"]  touchLeft) player.x -= 6;
    if(keys["ArrowRight"]  touchRight) player.x += 6;

    if(player.x > canvas.width) player.x = -player.w;
    if(player.x + player.w < 0) player.x = canvas.width;

    player.vy += gravity;
    player.y += player.vy;

    for(const p of platforms){

        const hit =
            player.vy > 0 &&
            player.x < p.x + p.w &&
            player.x + player.w > p.x &&
            player.y + player.h > p.y &&
            player.y + player.h < p.y + p.h;

        if(hit){

            spawnParticles(p.x,p.y);

            if(p.type === "bonus") player.vy = bonusJump;
            else player.vy = jumpPower;

            if(p.type === "break") p.y = 9999;

            if(!p.touched){
                p.touched = true;
                if(p.number > currentStep) currentStep = p.number;
                if(currentStep >= 100) gameWon = true;
            }
        }
    }

    if(player.y - cameraY < 250){
        cameraY = player.y - 250;
    }

    updateParticles();

    // lose condition
    if(player.y - cameraY > canvas.height + 200){
        gameOver = true;
    }
}

// draw
function draw(){

    if(bg.complete && bg.naturalWidth){
        ctx.drawImage(bg,0,0,canvas.width,canvas.height);
    } else {
        ctx.fillStyle = "#111";
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    // platforms
    for(const p of platforms){

        const y = p.y - cameraY;
        if(y < -100  y > canvas.height+100) continue;

        if(p.type==="break") ctx.fillStyle="#ff5555";
        else if(p.type==="bonus") ctx.fillStyle="#ffd700";
        else ctx.fillStyle="lime";

        ctx.fillRect(p.x,y,p.w,p.h);
    }

    // particles
    particles.forEach(p=>{
        ctx.fillStyle="white";
        ctx.fillRect(p.x,p.y-cameraY,3,3);
    });

    // player
    const py = player.y - cameraY;

    if(playerImg.complete){
        ctx.drawImage(playerImg,player.x,py,player.w,player.h);
    } else {
        ctx.fillStyle="white";
        ctx.fillRect(player.x,py,player.w,player.h);
    }

    // UI
    ctx.fillStyle="white";
    ctx.font="24px Fredoka";
    ctx.fillText(Escalón: ${currentStep}/100,10,35);

    // WIN
    if(gameWon){

        ctx.fillStyle="rgba(0,0,0,0.85)";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.textAlign="center";
        ctx.fillStyle="#ff77aa";
        ctx.font="42px Fredoka";

        ctx.fillText("Sos la mejor princesa",200,300);
        ctx.fillText("❤️",200,360);

        ctx.fillStyle="white";
        ctx.font="24px Fredoka";
        ctx.fillText("¡Felicitaciones!",200,430);
    }

    // GAME OVER
    if(gameOver){

        ctx.fillStyle="rgba(0,0,0,0.85)";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.textAlign="center";

        ctx.fillStyle="white";
        ctx.font="28px Fredoka";

        ctx.fillText("No pasa nada 😌",200,280);
        ctx.fillText("Intentá otra vez",200,330);

        // button
        ctx.fillStyle="#ff77aa";
        ctx.fillRect(120,380,160,50);

        ctx.fillStyle="#000";
        ctx.font="20px Fredoka";
        ctx.fillText("Jugar otra vez",200,412);
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
