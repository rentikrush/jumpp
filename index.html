<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Картинки
const bg = new Image();
const playerImg = new Image();
const platformImg = new Image();

bg.src = "assets/bg.jpg";
playerImg.src = "assets/player.png";
platformImg.src = "assets/platform.png";

// Игрок
let player = {
    x: 180,
    y: 600,
    w: 60,
    h: 60,
    vy: 0,
    jump: -12
};

let gravity = 0.45;
let keys = {};

let currentStep = 1;
let gameWon = false;

// Управление
document.addEventListener("keydown", e => {
    keys[e.code] = true;
});

document.addEventListener("keyup", e => {
    keys[e.code] = false;
});

// 100 платформ
let platforms = [];

let lastX = 180;

for (let i = 0; i < 100; i++) {

    let offset = Math.random() * 100 - 50;

    lastX += offset;

    if (lastX < 20) lastX = 20;
    if (lastX > 300) lastX = 300;

    platforms.push({
        x: lastX,
        y: 650 - (i * 80),
        w: 80,
        h: 20,
        index: i + 1,
        touched: false
    });
}

// Первая платформа под ногами
platforms[0].touched = true;

let cameraY = 0;

function update() {

    if (gameWon) return;

    // Движение
    if (keys["ArrowLeft"]) player.x -= 6;
    if (keys["ArrowRight"]) player.x += 6;

    // Телепорт через края
    if (player.x > canvas.width)
        player.x = -player.w;

    if (player.x + player.w < 0)
        player.x = canvas.width;

    // Физика
    player.vy += gravity;
    player.y += player.vy;

    // Прыжки
    for (let p of platforms) {

        if (
            player.vy > 0 &&
            player.x < p.x + p.w &&
            player.x + player.w > p.x &&
            player.y + player.h > p.y &&
            player.y + player.h < p.y + p.h
        ) {

            player.vy = player.jump;

            if (!p.touched) {

                p.touched = true;

                if (p.index > currentStep) {
                    currentStep = p.index;
                }

                if (currentStep >= 100) {
                    gameWon = true;
                }
            }
        }
    }

    // Камера
    if (player.y - cameraY < 250) {
        cameraY = player.y - 250;
    }
}

function draw() {

    // Фон
    if (bg.complete && bg.naturalWidth) {
        ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
    } else {
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // Платформы
    for (let p of platforms) {

        let screenY = p.y - cameraY;

        if (screenY < -100 || screenY > canvas.height + 100)
            continue;

        if (platformImg.complete && platformImg.naturalWidth) {

            ctx.drawImage(
                platformImg,
                p.x,
                screenY,
                p.w,
                p.h
            );

        } else {

            ctx.fillStyle = "lime";
            ctx.fillRect(
                p.x,
                screenY,
                p.w,
                p.h
            );
        }
    }

    // Игрок
    let playerScreenY = player.y - cameraY;

    if (playerImg.complete && playerImg.naturalWidth) {

        ctx.drawImage(
            playerImg,
            player.x,
            playerScreenY,
            player.w,
            player.h
        );

    } else {

        ctx.fillStyle = "white";
        ctx.fillRect(
            player.x,
            playerScreenY,
            player.w,
            player.h
        );
    }

    // Счётчик
    ctx.fillStyle = "white";
    ctx.font = "24px Arial";
    ctx.fillText(
        `Ступенька: ${currentStep}/100`,
        10,
        35
    );

    // Победа
    if (gameWon) {

        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        ctx.fillStyle = "#ff77aa";
        ctx.font = "40px Arial";
        ctx.textAlign = "center";

        ctx.fillText(
            "❤️",
            canvas.width / 2,
            260
        );

        ctx.fillText(
            "Ты лучшая",
            canvas.width / 2,
            330
        );

        ctx.fillText(
            "принцесса ❤️",
            canvas.width / 2,
            390
        );

        ctx.font = "22px Arial";

        ctx.fillText(
            "Поздравляю!",
            canvas.width / 2,
            460
        );
    }
}

function loop() {

    update();
    draw();

    requestAnimationFrame(loop);
}

loop();
</script>
